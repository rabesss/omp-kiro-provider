name: Pullfrog
run-name: ${{ inputs.name || github.workflow }}
on:
  workflow_dispatch:
    inputs:
      prompt:
        type: string
        description: Agent prompt
      name:
        type: string
        description: Run name

permissions:
  contents: read

jobs:
  pullfrog:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      # Required: Pullfrog mints installation tokens via OIDC.
      # https://docs.pullfrog.com/headless-action#required-permissions
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run agent
        uses: pullfrog/pullfrog@65e7f69dde116437a0876102b06e67f3633d192d # v0
        with:
          prompt: ${{ inputs.prompt }}
